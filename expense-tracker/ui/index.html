<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Expense Tracker</h1>
      <p>Track your spending with clarity.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Add Expense</h2>
        <form class="form" id="expense-form">
          <label>
            Amount
            <input id="amount" type="number" placeholder="0.00" step="0.01" min="0" required />
          </label>
          <label>
            Category
            <input id="category" type="text" placeholder="Food, Travel, Bills" required />
          </label>
          <button type="submit" class="primary">Add Expense</button>
        </form>
      </section>

      <section class="card">
        <h2>Summary</h2>
        <div class="summary">
          <div>
            <span>Total</span>
            <strong id="total">$0.00</strong>
          </div>
          <div>
            <span>Count</span>
            <strong id="count">0</strong>
          </div>
        </div>
      </section>

      <section class="card full">
        <div class="list-header">
          <h2>Recent Expenses</h2>
          <button class="ghost" id="clear">Clear All</button>
        </div>
        <ul class="list" id="expense-list"></ul>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
