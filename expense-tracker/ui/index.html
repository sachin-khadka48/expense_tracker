<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Expense Tracker</h1>
      <p>Track your spending with clarity.</p>
    </header>

    <main class="grid" aria-live="polite">
      <section class="card" aria-labelledby="add-expense-title">
        <h2 id="add-expense-title">Add Expense</h2>
        <form class="form" id="expense-form" novalidate>
          <label>
            Amount
            <input id="amount" type="number" placeholder="0.00" step="0.01" min="0.01" required aria-invalid="false" />
            <small class="error" id="amount-error" aria-live="polite"></small>
          </label>
          <label>
            Category
            <input id="category" type="text" placeholder="Food, Travel, Bills" required aria-invalid="false" />
            <small class="error" id="category-error" aria-live="polite"></small>
          </label>
          <button type="submit" class="primary">Add Expense</button>
        </form>
      </section>

      <section class="card" aria-labelledby="summary-title">
        <h2 id="summary-title">Summary</h2>
        <div class="summary">
          <div>
            <span>Total</span>
            <strong id="total">$0.00</strong>
          </div>
          <div>
            <span>Count</span>
            <strong id="count">0</strong>
          </div>
        </div>
      </section>

      <section class="card full" aria-labelledby="controls-title">
        <div class="list-header">
          <h2 id="controls-title">Expenses</h2>
          <div class="actions">
            <button class="ghost" id="export-json">Export JSON</button>
            <button class="ghost" id="export-csv">Export CSV</button>
            <label class="ghost file-btn">
              Import
              <input type="file" id="import-file" accept=".json,.csv" />
            </label>
            <button class="ghost" id="clear">Clear All</button>
          </div>
        </div>

        <div class="filters">
          <label>
            Sort
            <select id="sort">
              <option value="date-desc">Date (newest)</option>
              <option value="date-asc">Date (oldest)</option>
              <option value="amount-desc">Amount (high → low)</option>
              <option value="amount-asc">Amount (low → high)</option>
              <option value="category-asc">Category (A → Z)</option>
              <option value="category-desc">Category (Z → A)</option>
            </select>
          </label>

          <label>
            Filter Category
            <input id="filter-category" type="text" placeholder="e.g. Food" />
          </label>
        </div>

        <ul class="list" id="expense-list" aria-label="Expense list"></ul>
      </section>

      <section class="card full" aria-labelledby="charts-title">
        <h2 id="charts-title">Charts</h2>
        <div class="charts">
          <canvas id="chart-category" aria-label="Expenses by category" role="img"></canvas>
          <canvas id="chart-month" aria-label="Expenses by month" role="img"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
